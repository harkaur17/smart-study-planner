<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyHive</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-page">
      <!-- Left Panel -->
      <div class="login-left">
        <div class="login-left-top">
          <div class="login-brand">🐝 StudyHive</div>
          <div class="login-tagline">Your academic life,<br />organized.</div>
          <div class="login-tagline-sub">
            Track courses, tasks, and progress<br />all in one warm, focused
            space.
          </div>
        </div>
        <div class="login-features">
          <div class="login-feature-item">
            <span class="login-feature-dot"></span>Course & task management
          </div>
          <div class="login-feature-item">
            <span class="login-feature-dot"></span>Calendar view with due dates
          </div>
          <div class="login-feature-item">
            <span class="login-feature-dot"></span>Streak tracking & XP
          </div>
          <div class="login-feature-item">
            <span class="login-feature-dot"></span>Social study groups
          </div>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="login-right">
        <div class="login-card">
          <h1 id="auth-title">Welcome back</h1>
          <p id="auth-subtitle">Sign in to your StudyHive account</p>

          <div class="form-group" id="name-group" style="display: none">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter your name" />
          </div>

          <div class="form-group" id="username-group" style="display: none">
            <label>Username</label>
            <input type="text" id="username" placeholder="Choose a username" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>

          <button id="auth-btn">Sign in</button>
          <p class="login-toggle">
            <a id="toggle-link">Don't have an account? Register</a>
          </p>
        </div>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
