<html lang="en">
  <head>

    <link

    <title>Tasks</title>

  <body>
    <nav class="navbar">
      <span class="brand">Smart Study Planner</span>

      <div class="header-card">

            <button class="btn-edit">Edit</button>
            <button class="btn-delete">Delete</button>
          </div>
        </div>

        <div class="task-card">
          <div class="card-info">
            <h3>Midterm</h3>
            <p>EECS 2021</p>
            <p>TODO</p>
            <p>2026-04-04</p>
          </div>
          <div class="button-group">
            <button class="btn-edit">Edit</button>
            <button class="btn-delete">Delete</button>
          </div>
        </div>
      </div>
