<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Courses</title>
  </head>
  <body>
    <nav class="navbar">
      <span class="brand">Smart Study Planner</span>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="tasks.html">Tasks</a></li>
      </ul>
    </nav>

    <main class="container">
      <!--Header row-->
      <div class="header-card">
        <h1>Courses</h1>
        <button>Add Course</button>
      </div>

      <!--Course list-->
      <div class="card-list" id = "course-list">
        <!--courses list here-->
      </div>

      <div class="modal">
        <div class="modal-content">
          <form id="add-course-form">
            <div class="form-group">
              <label for="course-name">Course Name</label>
              <input type="text" id="course-name" placeholder="Enter course name" />
            </div>

            <div class="form-group">
              <label for="course-code">Course Code</label>
              <input
                type="text"
                id="course-code"
                placeholder="Enter course code"
              />
            </div>
          </form>

          <div class="button-group">
            <button id="cancel-course">Cancel</button>
            <button id="save-course">Save</button>
          </div>
        </div>
      </div>
    </main>
    <script src = "js/courses.js"></script>
  </body>
</html>
