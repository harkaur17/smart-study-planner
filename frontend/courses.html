<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Courses - StudyHive</title>
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-brand">
          <p>StudyHive</p>
          <span id="sidebar-username">Loading...</span>
        </div>
        <nav class="sidebar-nav">
          <p class="sidebar-section-label">Personal</p>
          <a href="index.html">Dashboard</a>
          <a href="courses.html" class="active">Courses</a>
          <a href="tasks.html">Tasks</a>
          <a href="calendar.html">Calendar</a>
          <p class="sidebar-section-label">Community</p>
          <a href="feed.html">Feed</a>
          <a href="groups.html">Groups</a>
          <a href="leaderboard.html">Leaderboard</a>
        </nav>
        <div class="sidebar-streak">
          🔥 <span id="sidebar-streak">0</span> day streak
        </div>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebar-avatar">?</div>
            <span class="sidebar-username" id="sidebar-name">User</span>
          </div>
          <button class="sidebar-logout" onclick="logout()">Logout</button>
        </div>
      </aside>

      <!-- Main Content -->
      <div class="page-content">
        <div class="header-card">
          <h1>Courses</h1>
          <button>Add Course</button>
        </div>

        <div class="card-list" id="course-list"></div>

        <!-- Add/Edit Course Modal -->
        <div class="modal">
          <div class="modal-content">
            <form id="add-course-form">
              <div class="form-group">
                <label for="course-name">Course Name</label>
                <input
                  type="text"
                  id="course-name"
                  placeholder="Enter course name"
                />
              </div>
              <div class="form-group">
                <label for="course-code">Course Code</label>
                <input
                  type="text"
                  id="course-code"
                  placeholder="Enter course code"
                />
              </div>
              <div class="form-group">
                <label for="course-semester">Semester</label>
                <select id="course-semester">
                  <option value="">Select semester</option>
                  <option value="Fall">Fall</option>
                  <option value="Winter">Winter</option>
                  <option value="Summer">Summer</option>
                </select>
              </div>
              <div class="form-group">
                <label for="course-year">Year</label>
                <input type="number" id="course-year" placeholder="e.g. 2026" />
              </div>
            </form>
            <div class="button-group">
              <button id="cancel-course">Cancel</button>
              <button id="save-course">Save</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/courses.js"></script>
  </body>
</html>
